    <style>
        /* Efek 3D Depth & Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            perspective: 1000px;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.5s;
        }
        .dark .glass-card {
            background: rgba(15, 23, 42, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {

        }

            filter: blur(120px);

        }

</head>
<body class="bg-[#F6F6F2] dark:bg-premium-dark text-slate-800 dark:text-slate-100 transition-colors duration-700 antialiased selection:bg-premium-gold selection:text-black">

        import {

            Send, Smartphone, Database, Globe, Moon, Sun,

        // --- TRANSLATIONS CONFIGURATION ---
        const translations = {

                },
                about: {

                    heading_1: "Merajut Kode & Dimensi",
                    heading_2: "Estetika Digital",
                    desc: "Saya Misbahuddin Said, seorang arsitek digital di balik identitas 'Iboo'. Setiap baris kode, seni, dan logika yang saya rakit hingga menjadi mahakarya hari ini, ada doa dan bimbingan Mama yang menjadi fondasi terkuatnya. Terima kasih Mama, karena selalu membimbing dan memberi semangat tanpa lelah. Tanpa kompas kasih sayang dari Mama, saya tidak akan pernah sampai di titik hebat ini. Sejauh ini bukan karena saya yang hebat tapi karena doa MAMA saya yang kuat.",
                    quote: "Sebaik-baik manusia adalah yang paling bermanfaat bagi orang lain."
                },
                skills: { subtitle: "Eksplorasi Engine", title: "Arsitektur Teknologi" },
                portfolio: { subtitle: "Showcase Eksklusif", title: "Proyek Seni Digital", view: "Buka Dimensi" },
                album: { subtitle: "Kreasi Audio", title: "Album Lagu & Musik", view: "Dengarkan Musik" },
                gallery: { subtitle: "Sudut Pandang", title: "Eksplorasi Sinematik", desc: "Sisi menangkap cahaya, bayangan, dan geometri abstrak melalui lensa kamera." },
                contact: { title: "Mulai Proyek 3D Anda", desc: "Mari diskusikan konsep visioner Anda dan ubah menjadi realitas digital interaktif.", name: "Nama Lengkap", email: "Alamat Email", msg: "Pesan Anda", send: "Kirim Sinyal" }
            },
            en: {
                nav: ['Home', 'About', 'Skills', 'Portfolio', 'Album', 'Gallery', 'Contact'],
                hero: {
                    welcome: "Salam & Welcome",
                    role: "Web Developer & 3D Creative Creator",
                    desc: "Bringing a new dimension to the web. Creating cinematic, aesthetic, and high-precision digital interactions.",
                    cta_primary: "Explore Work",

                },
                about: {
                    title: "Philosophy & Bio",
                    heading_1: "Weaving Code & Dimensions",
                    heading_2: "Digital Aesthetics",
                    desc: "I am Misbahuddin Said, the digital architect behind the 'Iboo' identity. To me, lines of code are not just logic, but a 3D canvas where art, math, and technology merge into functional masterpieces.",
                    quote: "The best of people are those that are most beneficial to others."
                },
                skills: { subtitle: "Engine Exploration", title: "Technology Architecture" },
                portfolio: { subtitle: "Exclusive Showcase", title: "Digital Art Projects", view: "Open Dimension" },
                album: { subtitle: "Audio Creation", title: "Song Albums & Music", view: "Listen to Track" },
                gallery: { subtitle: "Perspective", title: "Cinematic Exploration", desc: "Capturing light, shadows, and abstract geometry through the camera lens." },
                contact: { title: "Start Your 3D Project", desc: "Let's discuss your visionary concepts and transform them into interactive digital realities.", name: "Full Name", email: "Email Address", msg: "Your Message", send: "Send Signal" }
            }
        };

        // --- INTERACTIVE 3D BACKGROUND COMPONENT (THREE.JS) ---
        const ThreeBackground = () => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (!containerRef.current) return;

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 5;

                const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                containerRef.current.appendChild(renderer.domElement);

                const geometry = new THREE.TorusKnotGeometry(1.2, 0.4, 150, 20);
                const material = new THREE.MeshPhysicalMaterial({
                    color: 0xDFB15B,
                    roughness: 0.1,
                    metalness: 0.8,
                    clearcoat: 1.0,
                    clearcoatRoughness: 0.1,
                    wireframe: true
                });
                const torusKnot = new THREE.Mesh(geometry, material);
                scene.add(torusKnot);

                const particlesGeom = new THREE.BufferGeometry();
                const particlesCount = 400;
                const posArray = new Float32Array(particlesCount * 3);

                for(let i=0; i<particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 12;
                }
                particlesGeom.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                
                const particlesMat = new THREE.PointsMaterial({
                    size: 0.03,
                    color: 0x14B8A6,
                    transparent: true,
                    opacity: 0.6
                });
                const particleMesh = new THREE.Points(particlesGeom, particlesMat);
                scene.add(particleMesh);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                scene.add(ambientLight);

                const pointLight1 = new THREE.PointLight(0x7C3AED, 2);
                pointLight1.position.set(2, 3, 4);
                scene.add(pointLight1);

                const pointLight2 = new THREE.PointLight(0x14B8A6, 2);
                pointLight2.position.set(-2, -3, 2);
                scene.add(pointLight2);

                let mouseX = 0, mouseY = 0;
                const onMouseMove = (e) => {
                    mouseX = (e.clientX / window.innerWidth) - 0.5;
                    mouseY = (e.clientY / window.innerHeight) - 0.5;
                };
                window.addEventListener('mousemove', onMouseMove);

                const clock = new THREE.Clock();
                const animate = () => {
                    requestAnimationFrame(animate);
                    const elapsedTime = clock.getElapsedTime();

                    torusKnot.rotation.x = elapsedTime * 0.2;
                    torusKnot.rotation.y = elapsedTime * 0.15;
                    
                    torusKnot.position.x += (mouseX * 1.5 - torusKnot.position.x) * 0.05;
                    torusKnot.position.y += (-mouseY * 1.5 - torusKnot.position.y) * 0.05;

                    particleMesh.rotation.y = elapsedTime * 0.05;
                    particleMesh.rotation.x = -mouseY * 0.5;

                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    window.removeEventListener('mousemove', onMouseMove);
                    if (containerRef.current && renderer.domElement) {
                        containerRef.current.removeChild(renderer.domElement);
                    }
                };
            }, []);

            return <div ref={containerRef} className="absolute inset-0 z-0 pointer-events-none opacity-40 dark:opacity-75" />;
        };

        // --- 3D TILT EFFECT CARD ---
        const TiltCard = ({ children, className }) => {
            const cardRef = useRef(null);

            const handleMouseMove = (e) => {
                const card = cardRef.current;
                if (!card) return;
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const angleX = (yc - y) / 15; 
                const angleY = (x - xc) / 15; 

                card.style.transform = `rotateX(${angleX}deg) rotateY(${angleY}deg) translateY(-5px)`;
            };

            const handleMouseLeave = () => {
                const card = cardRef.current;
                if (!card) return;
                card.style.transform = 'rotateX(0deg) rotateY(0deg) translateY(0px)';
            };

            return (
                <div 
                    ref={cardRef}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={handleMouseLeave}
                    className={`glass-card rounded-3xl p-8 relative overflow-hidden transition-all duration-300 shadow-xl ${className}`}
                >
                    {children}
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [theme, setTheme] = useState('dark');
            const [lang, setLang] = useState('id');
            const t = translations[lang];

            useEffect(() => {
                document.documentElement.classList.add('dark'); 
            }, []);

            const toggleTheme = () => {
                if (theme === 'dark') {
                    document.documentElement.classList.remove('dark');
                    setTheme('light');
                } else {
                    document.documentElement.classList.add('dark');
                    setTheme('dark');
                }
            };

            const projects = [
                { title: "Metaverse Halal Trip", category: "Spatial Web Architecture", desc: "Platform travel 3D imersif berbasis web untuk menjelajahi rute sejarah peradaban Islam secara interaktif.", tech: ["Next.js", "Three.js", "WebGL"], color: "from-premium-teal to-cyan-500", icon: <Globe size={24} /> },
                { title: "Choco Design Engine", category: "UI/UX System", desc: "Design system revolusioner berbasis neuro-design dengan transisi mikro-interaksi 3D super halus.", tech: ["Tailwind", "Framer Motion", "React"], color: "from-premium-purple to-pink-500", icon: <Palette size={24} /> },
                { title: "AI Quranic NLP", category: "Artificial Intelligence", desc: "Sistem kecerdasan buatan analitik tajwid wajah dan suara real-time berbasis deep learning neural network.", tech: ["Python", "TensorFlow", "FastAPI"], color: "from-premium-gold to-amber-500", icon: <Cpu size={24} /> }
            ];

            const albums = [
                { 
                    title: "Midnight Code Symphony", 
                    category: "Lo-Fi / Ambient", 
                    desc: "Kompilasi instrumen sinematik penemani sesi coding larut malam untuk memicu fokus dan kreativitas tinggi.", 
                    tracks: ["Syntax Error Blues", "3D Canvas Dreamer", "Mama's Blessing (Outro)"], 
                    color: "from-amber-500 to-premium-gold", 
                    icon: <Disc size={24} className="animate-spin" style={{ animationDuration: '6s' }} /> 
                },
                { 
                    title: "Cybernetic Aesthetic", 
                    category: "Synthwave / Electronic", 
                    desc: "Alunan ketukan ritmis digital yang dirancang khusus untuk membangun energi saat merakit arsitektur 3D Web.", 
                    tracks: ["Neon Vertex", "WebGL Horizon", "Infinite Loop"], 
                    color: "from-premium-purple to-indigo-500", 
                    icon: <Music size={24} /> 
                }
            ];

            const sectionIds = ['home', 'about', 'skills', 'portfolio', 'albums', 'gallery', 'contact'];

            return (
                <div className="min-h-screen relative overflow-x-hidden selection:bg-premium-gold selection:text-black">
                    
                    {/* Glowing Ambience Spheres */}
                    <div className="absolute top-1/4 left-[-10%] w-[500px] h-[500px] rounded-full bg-premium-purple/10 glow-sphere pointer-events-none"></div>
                    <div className="absolute bottom-1/3 right-[-10%] w-[600px] h-[600px] rounded-full bg-premium-teal/10 glow-sphere pointer-events-none"></div>
                    <div className="absolute top-2/3 left-1/3 w-[400px] h-[400px] rounded-full bg-premium-gold/10 glow-sphere pointer-events-none"></div>

                    {/* Interactive 3D Canvas Background */}
                    <ThreeBackground />

                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 backdrop-blur-xl bg-[#F6F6F2]/60 dark:bg-premium-dark/60 border-b border-slate-200/10 transition-all duration-300 h-24 flex items-center">
                        <div className="max-w-7xl mx-auto w-full px-8 flex items-center justify-between">
                            <div className="flex items-center gap-3 group cursor-pointer">
                                <div className="p-2 rounded-xl bg-gradient-to-br from-premium-gold to-amber-600 text-premium-dark shadow-lg shadow-premium-gold/20 transform group-hover:rotate-12 transition-transform duration-500">
                                    <Cookie size={22} />
                                </div>
                                <div className="font-bold tracking-tight text-xl font-sans">
                                    <span className="text-slate-900 dark:text-white font-extrabold">JAGOAN</span>
                                    <span className="text-premium-gold font-light">.MAMA</span>
                                </div>
                            </div>

                            {/* Menu Links Desktop */}
                            <div className="hidden lg:flex items-center gap-8">
                                {t.nav.map((item, idx) => (
                                    <a key={idx} href={`#${sectionIds[idx]}`} className="text-sm font-medium tracking-wide text-slate-600 dark:text-slate-300 hover:text-premium-gold transition-colors duration-300">
                                        {item}
                                    </a>
                                ))}
                            </div>

                            <div className="flex items-center gap-4">
                                <button onClick={() => setLang(lang === 'id' ? 'en' : 'id')} className="px-3 py-1.5 rounded-lg border border-slate-300 dark:border-slate-800 text-xs font-bold uppercase tracking-wider flex items-center gap-1.5 hover:border-premium-gold transition-colors">
                                    <Globe size={14} /> {lang}
                                </button>
                                <button onClick={toggleTheme} className="p-2.5 rounded-xl border border-slate-300 dark:border-slate-800 text-slate-700 dark:text-slate-300 hover:text-premium-gold transition-colors">
                                    {theme === 'light' ? <Moon size={20}/> : <Sun size={20} className="text-premium-gold"/>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section id="home" className="min-h-screen flex items-center justify-center relative pt-24 px-6">

                                <span className="w-2 h-2 rounded-full bg-premium-gold"></span>
                                <span className="text-premium-gold text-xs font-bold tracking-widest uppercase">{t.hero.welcome}</span>
                            </div>
                            
                            <h1 className="text-6xl md:text-8xl font-black tracking-tighter text-slate-900 dark:text-white leading-none mb-6">
                                Misbahuddin <span className="text-transparent bg-clip-text bg-gradient-to-r from-premium-gold via-amber-400 to-yellow-200">Said</span>

                                    {t.hero.cta_primary} <ArrowUpRight size={18} />

                                <a href="#about" className="px-8 py-4 rounded-2xl border border-slate-300 dark:border-slate-800 bg-white/5 backdrop-blur-sm text-slate-700 dark:text-slate-300 font-semibold hover:border-premium-teal hover:text-premium-teal transition-all duration-300 w-full sm:w-auto">

                    {/* About Section */}
                    <section id="about" className="py-32 px-6 max-w-7xl mx-auto relative z-10">
                        <div className="grid lg:grid-cols-12 gap-16 items-center">
                            <div className="lg:col-span-5 flex justify-center">
                                <div className="relative group w-80 h-80 md:w-96 md:h-96 transform-style-3d perspective-1000">
                                    <div className="absolute inset-0 rounded-[40px] bg-gradient-to-tr from-premium-gold to-premium-purple opacity-30 blur-2xl group-hover:opacity-50 transition-opacity duration-500"></div>
                                    <div className="w-full h-full rounded-[40px] border-2 border-premium-gold/50 p-3 glass-card transform group-hover:rotate-y-12 group-hover:rotate-x-6 transition-transform duration-700">
                                        <div className="w-full h-full rounded-[30px] overflow-hidden grayscale group-hover:grayscale-0 transition-all duration-700 bg-slate-900 relative">
                                            <img 
                                                src="iboo.png" 
                                                alt="Misbahuddin Said" 
                                                className="w-full h-full object-cover scale-105 group-hover:scale-100 transition-transform duration-700"
                                            />
                                            <div className="absolute inset-0 bg-gradient-to-t from-premium-dark via-transparent to-transparent opacity-60"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-7">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="h-[2px] w-12 bg-premium-teal"></div>
                                    <span className="text-premium-teal font-extrabold tracking-widest uppercase text-xs">{t.about.title}</span>
                                </div>
                                <h2 className="text-4xl md:text-5xl font-black text-slate-900 dark:text-white mb-8 leading-tight">
                                    {t.about.heading_1} <br/>
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-premium-teal to-premium-purple">{t.about.heading_2}</span>
                                </h2>
                                <p className="text-slate-600 dark:text-slate-400 text-lg font-light leading-relaxed mb-8">
                                    {t.about.desc}
                                </p>
                                <div className="p-8 rounded-3xl bg-gradient-to-br from-slate-900/50 to-slate-800/30 dark:from-slate-900/80 dark:to-slate-900/40 border border-slate-200/10 relative overflow-hidden group">
                                    <div className="absolute top-[-50%] right-[-10%] w-40 h-40 rounded-full bg-premium-gold/5 blur-xl pointer-events-none"></div>
                                    <p className="font-serif text-3xl text-premium-gold mb-3 text-right">"خَيْرُ النَّاسِ أَنْفَعُهُمْ لِلنَّاسِ"</p>

                            </div>
                        </div>
                    </section>

                    {/* Skills Section */}
                    <section id="skills" className="py-32 px-6 max-w-7xl mx-auto relative z-10">
                        <div className="mb-20 text-center">
                            <span className="text-premium-teal font-extrabold tracking-widest uppercase text-xs mb-3 block">{t.skills.subtitle}</span>
                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 dark:text-white">{t.skills.title}</h2>
                        </div>

                        <div className="mb-20">
                            <span className="text-premium-purple font-extrabold tracking-widest uppercase text-xs mb-3 block">{t.portfolio.subtitle}</span>
                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 dark:text-white">{t.portfolio.title}</h2>
                        </div>

                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                            {projects.map((p, idx) => (
                                <TiltCard key={idx} className="flex flex-col h-full bg-slate-900">
                                    <div className={`w-14 h-14 rounded-2xl bg-gradient-to-br ${p.color} flex items-center justify-center text-white mb-8 shadow-lg`}>
                                        {p.icon}
                                    </div>
                                    <div className="mb-4">
                                        <span className={`text-xs font-bold uppercase tracking-wider bg-clip-text text-transparent bg-gradient-to-r ${p.color}`}>

                                    </div>
                                    <p className="text-slate-500 dark:text-slate-400 text-sm font-light leading-relaxed mb-8 flex-1">
                                        {p.desc}
                                    </p>
                                    <div className="flex items-center gap-2 text-sm font-bold text-slate-800 dark:text-slate-200 hover:text-premium-gold transition-colors cursor-pointer group/btn">
                                        {t.portfolio.view} 
                                        <ArrowUpRight size={16} className="transform group-hover/btn:translate-x-1 group-hover/btn:-translate-y-1 transition-transform" />
                                    </div>
                                </TiltCard>
                            ))}
                        </div>
                    </section>

                    {/* Albums Section */}
                    <section id="albums" className="py-32 px-6 max-w-7xl mx-auto relative z-10">
                        <div className="mb-20">
                            <span className="text-premium-gold font-extrabold tracking-widest uppercase text-xs mb-3 block">{t.album.subtitle}</span>
                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 dark:text-white">{t.album.title}</h2>
                        </div>

                        <div className="grid md:grid-cols-2 gap-8">
                            {albums.map((a, idx) => (
                                <TiltCard key={idx} className="flex flex-col md:flex-row gap-8 items-center bg-slate-900/40 backdrop-blur-md">
                                    <div className={`w-32 h-32 rounded-full bg-gradient-to-br ${a.color} flex items-center justify-center text-white shadow-2xl relative border-4 border-slate-800 flex-shrink-0 group`}>
                                        <div className="absolute w-8 h-8 rounded-full bg-premium-dark border border-slate-700 flex items-center justify-center">
                                            <div className="w-2 h-2 rounded-full bg-white"></div>
                                        </div>
                                        {a.icon}
                                    </div>

                                    <div className="flex-1 w-full">
                                        <span className={`text-xs font-bold uppercase tracking-wider bg-clip-text text-transparent bg-gradient-to-r ${a.color}`}>
                                            {a.category}
                                        </span>
                                        <h3 className="text-2xl font-bold text-slate-900 dark:text-white mt-1 font-sans mb-3">{a.title}</h3>
                                        <p className="text-slate-500 dark:text-slate-400 text-sm font-light leading-relaxed mb-4">
                                            {a.desc}
                                        </p>
                                        <ul className="space-y-1.5">
                                            {a.tracks.map((track, tIdx) => (
                                                <li key={tIdx} className="text-sm flex items-center gap-2 text-slate-600 dark:text-slate-400">
                                                    <Play size={12} className="text-premium-gold fill-premium-gold/20" />
                                                    {track}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </TiltCard>
                            ))}
                        </div>
                    </section>

                    {/* Gallery Section */}
                    <section id="gallery" className="py-32 px-6 max-w-7xl mx-auto relative z-10">
                        <div className="mb-20">
                            <span className="text-premium-purple font-extrabold tracking-widest uppercase text-xs mb-3 block">{t.gallery.subtitle}</span>
                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 dark:text-white mb-4">{t.gallery.title}</h2>
                            <p className="text-slate-500 dark:text-slate-400 max-w-xl font-light">{t.gallery.desc}</p>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                           {[
  "iboo4.png", 
  "kampus3.jpg", 
  "kampus4.png",
].map((fotoUrl, item) => (
    <div key={item} className="group relative aspect-video rounded-3xl overflow-hidden border border-slate-200/10 bg-slate-900/40 backdrop-blur-md">
        <img 
            src={fotoUrl} 
            alt={`Galeri ${item + 1}`} 
            className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" 
        />
    </div>
))}
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-32 px-6 max-w-3xl mx-auto relative z-10">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 dark:text-white mb-4">{t.contact.title}</h2>
                            <p className="text-slate-500 dark:text-slate-400 font-light">{t.contact.desc}</p>
                        </div>
                        <form className="space-y-6 glass-card rounded-3xl p-8 bg-slate-900/20" onSubmit={(e) => e.preventDefault()}>
                            <div>
                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">{t.contact.name}</label>
                                <input type="text" className="w-full bg-white/5 border border-slate-200/10 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-premium-gold transition-colors" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">{t.contact.email}</label>
                                <input type="email" className="w-full bg-white/5 border border-slate-200/10 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-premium-gold transition-colors" />
                            </div>
                            <div>
                                <label className="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">{t.contact.msg}</label>
                                <textarea rows="4" className="w-full bg-white/5 border border-slate-200/10 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-premium-gold transition-colors"></textarea>
                            </div>
                            <button type="submit" className="w-full py-4 rounded-xl bg-gradient-to-r from-premium-gold to-amber-500 text-premium-dark font-bold shadow-lg shadow-premium-gold/20 hover:shadow-premium-gold/40 transition-all duration-300 flex items-center justify-center gap-2">
                                {t.contact.send} <Send size={16} />
                            </button>
                        </form>
                    </section>

                    {/* Footer */}
                    <footer className="py-8 text-center border-t border-slate-200/10 text-xs text-slate-500">
                        <p>© 2026 Misbahuddin Said (Iboo). All Rights Reserved.</p>
                    </footer>

                </div>
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
